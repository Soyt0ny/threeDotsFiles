# === FONT ===
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# === WINDOW ===
window_padding_width 6
hide_window_decorations yes
confirm_os_window_close 0

# === OPACITY & BLUR ===
# Requires a compositor like picom on X11 or native Wayland to work fully
background_opacity 0.85
background_blur 32

# === CURSOR ===
cursor_shape block
cursor_blink_interval -1

# === SHELL ===
# Always open ZSH directly
shell /usr/bin/zsh
editor nvim

# === SCROLLBACK ===
scrollback_lines 10000

# === THEME ===
include current-theme.conf
